name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check out eacompute
        uses: actions/checkout@v4
        with:
          repository: petlukk/eacompute
          path: eacompute

      - name: Install LLVM 18 and system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev clang-18 libpolly-18-dev libzstd-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Ea compiler
        run: cargo build --features=llvm --release --quiet
        working-directory: eacompute

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install numpy

      - name: Compile kernels and generate bindings
        run: |
          EA=eacompute/target/release/ea
          for kernel in csv_scan csv_layout csv_parse csv_stats; do
            $EA kernels/${kernel}.ea --lib -o lib${kernel}.so
            $EA bind kernels/${kernel}.ea --python
          done

      - name: Verify
        run: |
          python generate_test.py --rows=10000
          python eastat.py test_10000.csv --quoted

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR=eastat-${TAG}-linux-x86_64
          mkdir -p $DIR/kernels
          cp lib*.so $DIR/
          cp csv_scan.py csv_layout.py csv_parse.py csv_stats.py $DIR/
          cp eastat.py bench.py generate_test.py $DIR/
          cp kernels/*.ea $DIR/kernels/
          cp README.md $DIR/
          tar czf ${DIR}.tar.gz $DIR

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: eastat-*-linux-x86_64.tar.gz

  build-linux-arm64:
