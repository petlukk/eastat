name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  EA_VERSION: "v1.5.4"
  EA_REPO: "petlukk/eacompute"

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download ea binary
        run: |
          curl -fsSL "https://github.com/$EA_REPO/releases/download/$EA_VERSION/ea-linux-x86_64.tar.gz" -o ea.tar.gz
          tar xzf ea.tar.gz
          mv ea-linux-x86_64/ea ./ea
          chmod +x ea

      - name: Compile kernels
        run: EA_BIN=./ea ./build_kernels.sh

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest
          pytest tests/ -v
